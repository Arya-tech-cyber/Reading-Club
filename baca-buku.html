<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baca Buku</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="halaman-baca">

    <div class="di-mana-abdul">
        <h1 class="judul-text">Baca Buku</h1>
    </div>

    <div class="menu-kontainer">
        <a href="index.html" class="btn">Halaman utama</a>
        <a href="#" class="btn">Request Buku</a>
        <a href="tentang-kami.html" class="btn">Tentang Kami</a>
    </div>

    <div class="daftar-buku">
        <a href="#modal-baca" class="card-link" onclick="bukaBuku('Laskar Pelangi', 'Ini adalah isi buka laskar pelangi, silahkan baca')">
            <div class="card-buku">
                <img src="laskar_pelangi.jpg" class="foto-buku">
                <p>Laskar Pelangi</p>
            </div>
        </a>

        <a href="#modal-baca" class="card-link" onclick="bukaBuku('S.A.N.D.A.L', 'Ini adalah isi cerita Senjata Anak Nakal Detector Ariel Launcher. Petualangan seru dimulai dari sini!')">
            <div class="card-buku">
                <img src="perpus.jpg" class="foto-buku">
                <p>Senjata Anak Nakal S.A.N.D.A.L</p>
            </div>
        </a>

        <a href="#modal-baca" class="card-link" onclick="bukaBuku('Mong Mong', 'Ini isi cerita Mong Mong.')">
            <div class="card-buku"> 
                <img src="perpus.jpg" class="foto-buku">
                <p>Mong mong</p>
            </div>
        </a>

        <a href="#modal-baca" class="card-link" onclick="bukaBuku('Mong Mong', 'Ini isi cerita Mong Mong.')">
            <div class="card-buku"> 
                <img src="perpus.jpg" class="foto-buku">
                <p>Mong mong</p>
            </div>
        </a>
    </div>

    <div id="modal-baca" class="modal-overlay">
        <div class="konten-baca">
            <a href="#" class="tombol-tutup">[X]</a>
            <h2 id="judul-modal">Judul Buku</h2>
            <hr>
            <div id="isi-modal" class="teks-cerita">
                </div>
        </div>
    </div>

    <script>
        function bukaBuku(judul, isi) {
            document.getElementById('judul-modal').innerText = judul;
            document.getElementById('isi-modal').innerText = isi;
        }
    </script>

</body>
</html>
